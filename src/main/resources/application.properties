spring.application.name=course-enrollment-system
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/CourseEnrollmentSystem
spring.datasource.username=root
spring.datasource.password=Root1234!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# Change your old short key to a long, secure one (at least 32 characters)
jwt.secret=this-is-my-super-secure-jwt-secret-key-that-is-long-enough!
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:5174

# Admin Credentials
admin.username=manoj
admin.password=manoj123
